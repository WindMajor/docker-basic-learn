# nginx/nginx.conf - 第5关：Nginx 反向代理配置
#
# 架构：Nginx（:80）→ 前端静态文件 或 后端 API（:3000）
# 入口 Nginx 根据请求路径决定转发目标

upstream backend_servers {
    # 后端服务（服务名：backend，端口 3000）
    # 此处可以添加多个 backend 实例做负载均衡
    server backend:3000;
    # server backend:3001;  # 如果水平扩展了多实例
    # server backend:3002;
}

server {
    listen 80;
    server_name localhost;

    # ===== 全局 gzip 配置 =====
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_disable "msie6";

    # ===== 日志格式 =====
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ===== API 反向代理 =====
    # 所有 /api/ 开头的请求转发到后端
    location /api/ {
        # proxy_pass：将请求转发到 upstream 或直接指定地址
        # 使用服务名 "backend" 而非 localhost
        # 在 Docker Compose 网络中，服务名自动解析为容器 IP
        proxy_pass http://backend_servers/;
        # 注意：proxy_pass 末尾的 / 会去除匹配的 location 前缀
        # 即 /api/health → http://backend:3000/health

        # proxy_set_header：设置转发请求头
        # 后端需要知道客户端的真实 IP 和协议
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ===== 前端静态文件 =====
    # 非 /api/ 的请求都转发到前端服务
    location / {
        proxy_pass http://frontend:80/;

        # 转发客户信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA 路由回退已在前端 Nginx 配置中处理
        # 此处不需要额外配置
    }

    # ===== 安全配置 =====
    # 隐藏 Nginx 版本信息
    server_tokens off;

    # 限制请求体大小（防止大文件上传攻击）
    client_max_body_size 10m;

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
