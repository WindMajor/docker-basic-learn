# ===============================================================
# nginx.conf - 第4关：Nginx 生产配置（SPA 部署）
# ===============================================================

server {
    # 监听端口
    listen 80;
    server_name localhost;

    # 静态文件根目录（从 builder 阶段复制过来的 dist）
    root /usr/share/nginx/html;

    # ===== gzip 压缩配置 =====
    # 启用 gzip 压缩，减少传输体积
    gzip on;
    # 最小压缩文件大小（小于此值不压缩，因为压缩后的文件可能更大）
    gzip_min_length 1k;
    # 压缩级别（1-9，越高压缩比越大但越慢）
    gzip_comp_level 6;
    # 需要压缩的 MIME 类型
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    # 是否在响应头中添加 Vary: Accept-Encoding
    gzip_vary on;
    # 禁用对 IE6 的 gzip（老旧浏览器不支持）
    gzip_disable "msie6";

    # ===== 静态文件缓存 =====
    # 对 CSS/JS/图片等静态资源设置长时间缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 不记录静态文件的访问日志（减少磁盘 IO）
        access_log off;
    }

    # ===== SPA 路由回退（关键配置） =====
    # 对于 Vue/React SPA（单页应用），所有路由都应该指向 index.html
    # 否则直接访问 /about 等路由会返回 404
    location / {
        # try_files：按顺序尝试文件是否存在
        # $uri：尝试精确匹配文件（如 /about.html）
        # $uri/：尝试作为目录（如 /about/index.html）
        # /index.html：都找不到则返回 index.html（由 Vue Router 处理路由）
        try_files $uri $uri/ /index.html;
    }

    # ===== 错误页面 =====
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
