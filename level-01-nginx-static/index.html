<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker 第1关</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d47a1 0%, #1976d2 50%, #42a5f5 100%);
            color: #fff;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 500px;
        }
        h1 { font-size: 28px; margin-bottom: 16px; }
        .status {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.6);
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .time {
            font-size: 48px;
            font-weight: 700;
            margin: 16px 0;
            font-variant-numeric: tabular-nums;
        }
        .info {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 24px;
        }
        .docker-icon { font-size: 64px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="docker-icon">🐳</div>
        <h1>Docker 第1关运行成功</h1>
        <div class="status">✅ 容器运行中</div>
        <div class="time" id="currentTime">--:--:--</div>
        <p>当前页面通过 Nginx 容器提供，文件通过卷挂载同步</p>
        <div class="info">服务器时间每 1 秒自动更新</div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            const t = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('currentTime').textContent = t;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
