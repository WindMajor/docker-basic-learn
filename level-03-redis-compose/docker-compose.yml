# ===============================================================
# docker-compose.yml - 第3关：多容器编排（Redis + API）
# ===============================================================
# Docker Compose V2 语法，使用 "docker compose" 命令
# Version 字段在 V2 中已废弃，不再需要指定

services:
  # ===== 服务1：API 服务 =====
  api:
    # build：从当前目录的 Dockerfile 构建镜像
    # 如果不指定 Dockerfile，默认使用 ./Dockerfile
    build: .

    # container_name：指定容器名称（可选，不指定则自动生成）
    container_name: lvl3-api

    # ports：端口映射 "宿主机端口:容器端口"
    ports:
      - "3000:3000"

    # environment：设置环境变量
    # 这里 REDIS_HOST 使用服务名 "redis"，Docker DNS 会自动解析为 Redis 容器的 IP
    # 容器网络中的服务名即主机名（hostname）
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production

    # depends_on：声明服务依赖关系
    # docker compose 会先启动 redis 再启动 api
    # 注意：depends_on 只保证 redis 容器启动（container running），
    # 但不保证 Redis 服务已经就绪（service ready）
    depends_on:
      - redis

    # networks：连接到指定网络
    # 不指定则自动加入默认网络（项目名_default）
    networks:
      - app-network

    # restart：重启策略
    restart: unless-stopped

  # ===== 服务2：Redis 缓存 =====
  redis:
    # image：直接使用官方镜像
    # redis:7-alpine 基于 Alpine Linux，体积约 32MB
    # 对比 redis:7（基于 Debian）约 117MB
    image: redis:7-alpine

    container_name: lvl3-redis

    # healthcheck：健康检查
    # 定期检查 Redis 是否可连接
    # test：执行的检查命令
    # interval：检查间隔
    # timeout：超时时间
    # retries：重试次数
    # start_period：启动后等待时间再开始检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # volumes：数据卷
    # redis-data 是命名卷（named volume），由 Docker 管理，存放在 /var/lib/docker/volumes/
    # 命名卷 vs bind mount（-v $(pwd):/path）：
    #   - 命名卷：由 Docker 管理，跨平台兼容性好，性能更优
    #   - bind mount：直接映射宿主机目录，方便调试和查看
    #   - 生产环境推荐使用命名卷
    volumes:
      - redis-data:/data

    networks:
      - app-network

    restart: unless-stopped

    # expose：仅内部暴露端口（不映射到宿主机）
    # Compose 中服务可通过服务名直接访问，不需要 ports 映射
    # 但 ports 配置仅用于宿主机访问该端口
    expose:
      - "6379"

# ===== 卷定义 =====
# 声明命名卷（named volumes），需要在顶层 volumes 中定义
# 如果不定义，Docker 会自动创建匿名卷（anonymous volume）
volumes:
  redis-data:
    # driver: 默认使用 local 驱动
    # 可以指定 driver_opts 配置卷的参数（如 NFS 挂载）
    driver: local

# ===== 网络定义 =====
# Docker Compose 会自动创建一个默认的 bridge 网络
# 这里显式定义，便于理解网络结构
networks:
  app-network:
    # driver: bridge 是默认网络类型，适用于单机部署
    # overlay 网络用于 Swarm 多机部署
    driver: bridge
